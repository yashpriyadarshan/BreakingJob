# This workflow builds the Spring Boot project on every push and pull request.

name: Build Spring Boot Application

# Controls when the workflow will run
on:
  # Triggers the workflow on push events for the "main" branch
  push:
    branches: [ "main" ]
  # Triggers the workflow on pull request events targeting the "main" branch
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up JDK 21
      # This version must match the <java.version> in your pom.xml.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Cache Maven packages
      # This speeds up the build process by caching dependencies.
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Build the project with Maven
      # The 'package' command compiles, tests, and packages the application into a JAR file.
      # If the build fails (e.g., compilation error or a failing test), the workflow fails.
      - name: Build with Maven
        run: mvn -B package --file pom.xml
